description = """
A general-purpose package index with birds of varying complexity.
Tests pick the packages they need from this single index.

    tiny-sparrow                    — no deps (replaces iniconfig)
    swift-finch                     — small tree (replaces anyio)
    ├── loud-warbler                  (replaces idna)
    └── silly-wren                    (replaces sniffio)
    golden-crane                    — medium tree (replaces flask)
    ├── proud-heron → calm-ibis       (replaces werkzeug → markupsafe)
    ├── gentle-egret → calm-ibis      (replaces jinja2 → markupsafe)
    ├── clever-robin                  (replaces click)
    ├── quick-jay                     (replaces itsdangerous)
    └── quiet-dove                    (replaces blinker)
    bold-eagle                      — platform-specific wheels (replaces black)
    ├── sharp-talon                   (replaces platformdirs)
    └── bright-feather                (replaces pathspec)
    spotted-owl                     — many versions (replaces tqdm)

Version numbers mirror the real packages so test code changes are minimal.
"""

###############################################################################
# tiny-sparrow — zero-dep package (replaces iniconfig)
#
#   iniconfig versions used in tests: 0.1, 1.0.0, 1.1.1, 2.0.0
###############################################################################

[packages.tiny-sparrow.versions."0.1"]
[packages.tiny-sparrow.versions."1.0.0"]
[packages.tiny-sparrow.versions."1.1.1"]
[packages.tiny-sparrow.versions."2.0.0"]

###############################################################################
# swift-finch — small dep tree (replaces anyio → idna, sniffio)
#
#   anyio versions used: 1.0.0, 3.0.0, 3.5.0, 3.7.0, 3.7.1, 4.0.0, 4.3.0
#   All versions depend on loud-warbler + silly-wren.
###############################################################################

[packages.swift-finch.versions."1.0.0"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

[packages.swift-finch.versions."3.0.0"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

[packages.swift-finch.versions."3.5.0"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

[packages.swift-finch.versions."3.7.0"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

[packages.swift-finch.versions."3.7.1"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

[packages.swift-finch.versions."4.0.0"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

[packages.swift-finch.versions."4.3.0"]
requires = ["loud-warbler>=1.0.0", "silly-wren>=1.0.0"]

# loud-warbler (replaces idna — various versions needed)
[packages.loud-warbler.versions."1.0.0"]
[packages.loud-warbler.versions."2.0.0"]
[packages.loud-warbler.versions."3.6"]

# silly-wren (replaces sniffio — resolved versions: 1.3.1)
[packages.silly-wren.versions."1.3.1"]

###############################################################################
# golden-crane — medium dep tree (replaces flask → werkzeug, jinja2, etc.)
#
#   flask versions used: 1.1.4, 2.0.0, 2.2.5, 3.0.0, 3.0.2
###############################################################################

[packages.golden-crane.versions."1.1.4"]
requires = ["proud-heron", "gentle-egret", "clever-robin", "quick-jay"]

[packages.golden-crane.versions."2.0.0"]
requires = ["proud-heron>=2.0.0", "gentle-egret>=3.0.0", "clever-robin>=8.0.0", "quick-jay>=2.0.0"]

[packages.golden-crane.versions."2.2.5"]
requires = ["proud-heron>=2.0.0", "gentle-egret>=3.0.0", "clever-robin>=8.0.0", "quick-jay>=2.0.0", "quiet-dove>=1.6.0"]

[packages.golden-crane.versions."2.3.2"]
requires = ["proud-heron>=2.0.0", "gentle-egret>=3.0.0", "clever-robin>=8.0.0", "quick-jay>=2.0.0", "quiet-dove>=1.6.0"]

[packages.golden-crane.versions."2.3.3"]
